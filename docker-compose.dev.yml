services:
  mongo:
    ports:
      - "27017:27017"

  backend:
    build:
      target: development
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
    volumes:
      - ../lifeflow-backend:/usr/src/app
      - /usr/src/app/node_modules

  frontend:
    build:
      context: ../lifeflow-frontend/my-app
    ports:
      - "3000:3000"
    volumes:
      - ../lifeflow-frontend/my-app:/usr/src/app
      - /usr/src/app/node_modules
