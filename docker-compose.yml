services:
  mongo:
    image: mongo
    restart: always
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ../lifeflow-backend
    environment:
      - MONGO_URI=${MONGO_URI}
    depends_on:
      - mongo

  frontend:
    build:
      context: ../lifeflow-frontend/my-app
    depends_on:
      - backend

volumes:
  mongo_data:
