services:
  mongo:
    image: mongo
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./lifeflow-backend
    environment:
      - MONGO_URI=mongodb://mongo:27017/lifeflow
    depends_on:
      - mongo

  frontend:
    build:
      context: ./lifeflow-frontend/my-app
    depends_on:
      - backend

volumes:
  mongo_data:
